name: Run experiment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: fiesta-scattering-astro
          init-shell: bash
          cache-environment: true

      - name: Convert and run notebook
        shell: micromamba-shell {0}
        run: |
          jupytext --to notebook 01_astro_synthesis.py
          jupyter execute --inplace 01_astro_synthesis.ipynb

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
